[env:esp32dev]
platform = espressif32 @ 6.6.0
board = esp32dev
framework = arduino, espidf
monitor_speed = 115200

build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -Wno-error=maybe-uninitialized
    -Wno-error=unused-variable
    -Wno-unused-variable

lib_deps =
    earlephilhower/ESP8266Audio @ ^1.9.7
    waspinator/AccelStepper @ ^1.64